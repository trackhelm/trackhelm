[server]
# Host and port of the TrackMania server
host = "127.0.0.1"
port = 5000

# Login credentials for an admin account with callback permissions
login = "SuperAdmin"
password = "SuperAdmin"

[database]
# SQLAlchemy async URL. Example uses a local SQLite file via aiosqlite.
url = "sqlite+aiosqlite:///./trackhelm.db"

[logging]
level = "INFO"
dir = "logs"
max_bytes = 5242880 # 5 MB
backup_count = 3

[reconnect]
# Retry GBXRemote sessions after the dedicated server restarts or drops the socket.
enabled = true
initial_delay_seconds = 1.0
max_delay_seconds = 30.0
multiplier = 2.0
max_retry_time_seconds = 50.0

[event_bus]
# Bounded event dispatch. Normal-priority events are dropped when the queue is full.
queue_size = 1000
workers = 4
handler_timeout_seconds = 10.0
slow_handler_warning_seconds = 1.0
high_priority_timeout_seconds = 1.0
overload_policy = "drop_newest"

[plugin_faults]
# Disable a plugin after this many handler/task faults.
max_failures = 3

[plugins]
# List of enabled plugin keys
enabled = []

# Example inline plugin config (optional)
# [plugins.some_plugin]
# option = "value"
